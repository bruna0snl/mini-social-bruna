<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="https://pbs.twimg.com/media/GJer-mXW8AAwgnH.png" class="avatar">
      <div>
        <span class="name">Bruna</span>
        <span class="username">@brunasnl</span>
      </div>
    </div>

    <p class="post-text">hoje esta ensolarado</p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="https://i.pinimg.com/236x/5f/55/71/5f5571ac8877c16f111aa7618ae4e9fe.jpg" class="avatar-small">
        <p>esta muito bonito mesmo</p>
      </div>

      <div class="comment">
        <img src="https://i.pinimg.com/736x/23/c5/62/23c562c57d7c1c89fb9974124f1f111f.jpg" class="avatar-small">
        <p>estou achando que esta quente demais</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
